<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Presenças Evento X</title>
    <link rel="stylesheet" href="../css/estilo.css" />
    <link rel="icon" type="image/png" href="..\icon_sample.jpeg" />
  </head>
  <body>
    <div class="campo_inscricao">
      <h1>Área de Inscrição - Evento</h1>
      <form id="form_inscricao">
        <p>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Nome Completo"
            required
          />
        </p>
        <p>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="E-mail"
            required
          />
        </p>
        <button type="submit">Increver-se no Evento</button>
      </form>
    </div>

    <div class="campo_presenca">
      <h1>Área de Registro de Presença</h1>
      <form id="form_presenca">
        <p>
          <input
            type="email"
            id="email_presenca"
            name="email"
            placeholder="E-mail Inscrito"
            required
          />
        </p>
        <button type="submit">Registrar Presença</button>
      </form>
    </div>

    <div class="campo_participantes">
      <h2>Inscritos Ausentes:</h2>
      <ol id="lista_inscritos">
        <!-- Lista de inscritos será preenchida aqui -->
      </ol>
      <h2>Inscritos Presentes:</h2>
      <ol id="lista_presentes">
        <!-- Lista de presenças será preenchida aqui -->
      </ol>
    </div>

    <script src="../js/script.js"></script>
    <footer>
      <p>
        Instituto Federal Sul-rio-grandense - Campus Passo Fundo | Disciplina:
        Criação de Páginas Web
      </p>
    </footer>
  </body>
</html>
