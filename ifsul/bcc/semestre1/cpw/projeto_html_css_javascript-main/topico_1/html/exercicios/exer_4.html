        <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Confusa</title>
</head>
<body>
    <!-- Cabeçalho -->
    <header>
        <h1>Título da Página</h1>
    </header>

    <!-- Corpo -->
    <main>
        <h2>Formulário de Preenchimento</h2>
        <form action="#" method="get">
            <!-- Campo de texto -->
            <input type="text" id="nome" name="nome" required>
            <label for="nome">Nome:</label>
            <br>

            <!-- Campo de data -->
            <input type="date" id="data" name="data" required>
            <label for="data">Data:</label>
            <br>

            <!-- Campo select -->
            <select id="opcao" name="opcao" required>
                <option value="opcao1">Opção 1</option>
                <option value="opcao2">Opção 2</option>
                <option value="opcao3">Opção 3</option>
            </select>
            <label for="opcao">Escolha uma opção:</label>
            <br>

            <!-- Campo radio -->
            <input type="radio" id="escolha1" name="escolha" value="opcao1" required>
            <label for="escolha1">Opção 1</label>
            <input type="radio" id="escolha2" name="escolha" value="opcao2" required>
            <label for="escolha2">Opção 2</label>
            <br>

            <!-- Botão de submit -->
            <button type="submit">Enviar</button>
        </form>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>&copy; 2025 Meu Site. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
