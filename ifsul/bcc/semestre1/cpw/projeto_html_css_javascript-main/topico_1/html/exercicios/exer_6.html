<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Teste </title>

    <style>
        .caixa {
            width: 200px;
            height: 200px;
            background-color: wheat;
            border: 1px solid black;
            margin: 10px auto;
            text-align: center;
            text-transform: uppercase;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .imagem {
            display: block;
            margin: 10px auto;
            max-width: 10%;
            height: auto;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
<body>

    <!-- Cabeçalho -->
    <header>
        <h1 style="text-align: center;"> Título da Página </h1>
    </header>

    <!-- Corpo -->
    <main>
        <div class="caixa">
            <p>Texto 1</p> 
        </div>

        <!-- Imagem externa -->
        <img src="https://artpoin.com/wp-content/uploads/2023/10/artpoin-sonic-the-hedgehog8.png" alt="Sonic" class="imagem">

        <!-- Imagem interna -->
        <img src="imagens/bike.jpg" alt="Bicicleta" class="imagem">
    </main>

    <!-- Rodapé -->
    <footer>
        <p>Data Atual: <span id="data"></span></p>
    </footer>

    <!-- Script para exibir a data atual -->
    <script>
        document.getElementById("data").textContent = new Date().toLocaleDateString("pt-BR");
    </script>

</body>
</html>
